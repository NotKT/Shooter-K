name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  export:
    name: Export Android APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    defaults:
      run:
        working-directory: Shooter-K
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Godot export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/* ~/.local/share/godot/export_templates/ 2>/dev/null || true

      - name: Setup debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Make output folder
        run: mkdir -v -p build/android

      - name: Export Android APK (debug)
        run: |
          godot --headless --export-debug "Android" build/android/Shooter-K.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Shooter-K-android-debug
          path: Shooter-K/build/android/Shooter-K.apk
