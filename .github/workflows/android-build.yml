name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  export:
    name: Export Android APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    defaults:
      run:
        working-directory: Shooter-K
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Godot export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/* ~/.local/share/godot/export_templates/ 2>/dev/null || true

      - name: Configure Android export editor settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.3.tres << 'EOF'
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/java_sdk_path = "/usr/lib/jvm/java-17-openjdk-amd64"
          export/android/android_sdk_path = "/usr/lib/android-sdk"
          export/android/debug_keystore = "/root/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Make output folder
        run: mkdir -v -p build/android

      - name: Export Android APK (debug)
        run: |
          godot --headless --export-debug "Android" build/android/Shooter-K.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Shooter-K-android-debug
          path: Shooter-K/build/android/Shooter-K.apk
